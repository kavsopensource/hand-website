<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand Model Test 3 - ASCII</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #ffffff;
    height: 100%;
  }
  #asciiContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  #asciiContainer pre {
    margin: 0 !important;
  }
</style>
</head>
<body>

<div id="asciiContainer"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { AsciiEffect } from 'three/addons/effects/AsciiEffect.js';

// ---- Basic scene setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 1.5, 5);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
const RENDER_SCALE = 0.5; // render at half resolution internally
renderer.setSize(window.innerWidth * RENDER_SCALE, window.innerHeight * RENDER_SCALE);

// ---- Lighting ----
// Two contrasting colored lights so the ASCII effect (with color:true)
// naturally renders a gradient between them across the model surface,
// rather than one flat color.
const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
scene.add(ambientLight);

// Warm red key light -- this will dominate the lit/highlight side
const keyLight = new THREE.DirectionalLight(0xb33a2e, 2.7);
keyLight.position.set(3, 4, 3);
scene.add(keyLight);

// Deep teal fill light -- this will show up in the shadow side,
// giving a second color instead of just darker red
const fillLight = new THREE.DirectionalLight(0x1f4a4a, 1.2);
fillLight.position.set(-3, 1, -2);
scene.add(fillLight);

// ---- ASCII Effect setup ----
// Characters listed light-to-dark. This set aims for "medium-dense":
// readable as a solid form without turning into a black blob.
const charSet = ' .,:░▒▓█';

const effect = new AsciiEffect(renderer, charSet, {
  invert: false,      // bright background stays blank, dark hand becomes characters
  resolution: 0.15,   // lower = more characters/denser, higher = sparser. Tune this.
  color: true          // render actual per-character color from the lit scene
});
effect.setSize(window.innerWidth, window.innerHeight);
effect.domElement.style.backgroundColor = '#ffffff';
document.getElementById('asciiContainer').appendChild(effect.domElement);

// ---- Pivot setup ----
const pivotGroup = new THREE.Group();
scene.add(pivotGroup);

const modelHeight = 3.69;
const wristHeightEstimate = modelHeight * 0.27;

let handModel = null;

const loader = new GLTFLoader();
const modelURL = 'https://cdn.jsdelivr.net/gh/kavsopensource/hand-model@main/female_hand.glb';

loader.load(
  modelURL,
  (gltf) => {
    handModel = gltf.scene;

    const box = new THREE.Box3().setFromObject(handModel);
    const center = box.getCenter(new THREE.Vector3());
    const min = box.min;

    handModel.position.x -= center.x;
    handModel.position.z -= center.z;
    handModel.position.y -= (min.y + wristHeightEstimate);

    pivotGroup.add(handModel);
    pivotGroup.position.set(0, -0.5, 0);
  },
  (xhr) => {
    console.log((xhr.loaded / xhr.total * 100).toFixed(0) + '% loaded');
  },
  (error) => {
    console.error('Error loading model:', error);
  }
);

// ---- Mouse tracking ----
let mouseX = 0;
window.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
});

// ---- Rotation behaviour ----
const maxRotation = 0.35;
let currentRotation = 0;
let targetRotation = 0;

// ---- Render loop ----
let lastTime = 0;
const targetFPS = 15;
const interval = 1000 / targetFPS;

function animate(timestamp) {
  requestAnimationFrame(animate);
  const delta = timestamp - lastTime;
  if (delta < interval) return;
  lastTime = timestamp - (delta % interval);

  if (handModel) {
    targetRotation = mouseX * maxRotation;
    currentRotation += (targetRotation - currentRotation) * 0.05;
    pivotGroup.rotation.y = currentRotation;
  }

  effect.render(scene, camera);
}
animate(0);

// ---- Handle window resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth * RENDER_SCALE, window.innerHeight * RENDER_SCALE);
  effect.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
