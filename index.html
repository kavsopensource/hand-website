<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hand</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow-y: scroll; }
  body {
    background: #ffffff;
    min-height: 100%;
  }
  #asciiContainer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #asciiContainer pre {
    margin: 0 !important;
  }
</style>
</head>
<body>

<div id="asciiContainer"></div>
<div style="height: 500vh;"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { AsciiEffect } from 'three/addons/effects/AsciiEffect.js';

// ---- Scene ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 5);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
const RENDER_SCALE = 0.5;
renderer.setSize(window.innerWidth * RENDER_SCALE, window.innerHeight * RENDER_SCALE);

// ---- Lighting ----
const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 2.2);
keyLight.position.set(3, 4, 3);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
fillLight.position.set(-3, 1, -2);
scene.add(fillLight);

// ---- ASCII Effect ----
const charSet = ' ░▒▓█';
const effect = new AsciiEffect(renderer, charSet, {
  invert: false,
  resolution: 0.15,
  color: false
});
effect.setSize(window.innerWidth, window.innerHeight);
effect.domElement.style.color = '#a3221f';
effect.domElement.style.backgroundColor = '#ffffff';
document.getElementById('asciiContainer').appendChild(effect.domElement);

// ---- Hand model ----
const pivotGroup = new THREE.Group();
scene.add(pivotGroup);

const modelHeight = 3.69;
const wristHeightEstimate = modelHeight * 0.27;
let handModel = null;

const loader = new GLTFLoader();
loader.load(
  'https://cdn.jsdelivr.net/gh/kavsopensource/hand-model@main/female_hand.glb',
  (gltf) => {
    handModel = gltf.scene;
    const box = new THREE.Box3().setFromObject(handModel);
    const center = box.getCenter(new THREE.Vector3());
    const min = box.min;
    handModel.position.x -= center.x;
    handModel.position.z -= center.z;
    handModel.position.y -= (min.y + wristHeightEstimate);
    pivotGroup.add(handModel);
    pivotGroup.position.set(0, -0.5, 0);
  }
);

// ---- Mouse tracking ----
// Raw mouse -1 to 1 on both axes
let mouseX = 0;
let mouseY = 0;
// Smoothed values
let currentMouseX = 0;
let currentMouseY = 0;

window.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  mouseY = -((e.clientY / window.innerHeight) * 2 - 1); // invert Y so up = positive
});

// ---- Scroll tracking ----
let scrollY = window.scrollY;
let currentScrollY = window.scrollY;
window.addEventListener('scroll', () => {
  scrollY = window.scrollY;
});

// ---- Rotation ----
const maxRotation = 0.3;
let currentRotation = 0;
let targetRotation = 0;

// ---- How far the hand drifts toward the mouse (in 3D units) ----
const mouseDriftX = 0.8;  // left/right drift amount
const mouseDriftY = 0.4;  // up/down drift amount

// ---- Render loop ----
let lastTime = 0;
const interval = 1000 / 30;

function animate(timestamp) {
  requestAnimationFrame(animate);

  if (handModel) {
    // Smooth mouse following -- runs every frame for fluid feel
    currentMouseX += (mouseX - currentMouseX) * 0.04;
    currentMouseY += (mouseY - currentMouseY) * 0.04;

    // Smooth scroll
    currentScrollY += (scrollY - currentScrollY) * 0.02;
    const maxScrollLift = 0.8;
    const scrollNorm = Math.min(currentScrollY / (document.body.scrollHeight - window.innerHeight), 1);
    const scrollOffset = scrollNorm * maxScrollLift;

    // Unproject mouse to world position at the hand's depth
const vec = new THREE.Vector3(currentMouseX, currentMouseY, 0.5);
vec.unproject(camera);
const dir = vec.sub(camera.position).normalize();
const distance = (0 - camera.position.z) / dir.z;
const pos = camera.position.clone().add(dir.multiplyScalar(distance));

// Offset so fingertips (not forearm center) align with cursor
const fingerOffset = 2.0; // nudges the model down so fingers are at cursor

// Clamp position so forearm end never shows
const clampX = 1.5;
const clampYMin = -1.2;
const clampYMax = 0.8;

pivotGroup.position.x = Math.max(-clampX, Math.min(clampX, pos.x));
pivotGroup.position.y = Math.max(clampYMin, Math.min(clampYMax, pos.y - fingerOffset)) + scrollOffset;
  }

  // Throttle the expensive ASCII render to 30fps
  const delta = timestamp - lastTime;
  if (delta < interval) return;
  lastTime = timestamp - (delta % interval);

  if (handModel) {
    // Wrist rotation still follows mouse X
    targetRotation = mouseX * maxRotation;
    currentRotation += (targetRotation - currentRotation) * 0.05;
    pivotGroup.rotation.y = currentRotation;
  }

  effect.render(scene, camera);
}
animate(0);

// ---- Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth * RENDER_SCALE, window.innerHeight * RENDER_SCALE);
  effect.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
